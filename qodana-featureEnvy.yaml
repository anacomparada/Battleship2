#-------------------------------------------------------------------------------#
#               Qodana analysis is configured by qodana.yaml file               #
#             https://www.jetbrains.com/help/qodana/qodana-yaml.html            #
#-------------------------------------------------------------------------------#

version: "1.0"

# Specify inspection profile for code analysis
profile:
  name: qodana.starter

projectJDK: "25" #(Applied in CI/CD pipeline)

# Specify Qodana linter for analysis (Applied in CI/CD pipeline)
linter: jetbrains/qodana-jvm:2025.3

# =========================================================================
# QUALITY GATE: FEATURE ENVY (Martin Fowler)
# Segundo o livro "Object-Oriented Metrics in Practice" (Lanza & Marinescu),
# este cheiro é detetado pelas métricas: ATFD >= 5, LAA < 0.33 e FDP <= 5.
# Como o Qodana mapeia estas métricas para inspeções de acoplamento da JVM,
# ativamos as seguintes regras para garantir o encapsulamento:
# =========================================================================
include:
  - name: FeatureEnvy
  - name: OverlyCoupledMethod
  - name: OverlyCoupledClass
  - name: LawOfDemeter

# =========================================================================
# LIMIARES (THRESHOLDS)
# Definimos a tolerância como ZERO (any: 0) para novas infrações.
# Num ambiente de CI/CD (GitHub Actions), o objetivo é impedir a regressão
# da qualidade. Se 1 metodo violar as heurísticas acima, o workflow falha.
# =========================================================================
failureConditions:
  severityThresholds:
    any: 0