#IGE-111561
#Definição do method metric - overly long method
version: "1.0"

profile:
  name: qodana.recommended

include:
  - name: OverlyLongMethod

exclude: []

# Quality gate
failThreshold: 1

# Configuração da inspection
inspections:
  - id: OverlyLongMethod
    enabled: true
    options:
      m_limit: 30
