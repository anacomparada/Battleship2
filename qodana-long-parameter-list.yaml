#-------------------------------------------------------------------------------#
#   Qodana config - Long Parameter List Detection                               #
#   Code Smell: Long Parameter List (Fowler)                                    #
#   Inspection ID: ParametersPerMethod                                          #
#   Metric: NOPM >= 4 (Lanza & Marinescu, OO Metrics in Practice)              #
#-------------------------------------------------------------------------------#
version: "1.0"

profile:
  name: qodana.starter

include:
  - name: ParametersPerMethod

exclude:
  - name: All

projectJDK: "25"

linter: jetbrains/qodana-jvm-community:2024.3

failureConditions:
  severityThresholds:
    any: 1
  ```

