# Número de Aluno: 123774 | Nome: Ana Comparada Reganha
# Code Smell: Feature Envy (Fowler)
# Métricas: ATFD >= 5, FDP >= 5, LAA < 0.33 (Lanza & Marinescu)

name: "Code Smell - Feature Envy"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  detect-feature-envy:
    runs-on: ubuntu-latest
    name: "Detect Feature Envy (Fowler)"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Qodana Community
        uses: JetBrains/qodana-action@v2024.3
        with:
          args: --config,qodana-feature-envy.yaml

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: feature-envy-report
          path: ${{ runner.temp }}/qodana/results/
          retention-days: 14