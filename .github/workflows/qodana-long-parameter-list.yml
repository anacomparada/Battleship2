# Número de aluno: 93263 - Diogo Soares
# Code Smell: Long Parameter List (Fowler)
# Inspection ID: ParametersPerMethod
# Threshold: NOPM >= 4 (parameterLimit: 3)

name: "Code Smell - Long Parameter List"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  detect-long-parameter-list:
    runs-on: ubuntu-latest
    name: "Detect Long Parameter List (Fowler)"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Qodana Community (no token required)
        uses: JetBrains/qodana-action@v2024.3
        with:
          args: --config,qodana-long-parameter-list.yaml

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: long-parameter-list-report
          path: ${{ runner.temp }}/qodana/results/
          retention-days: 14