# Número de aluno: 93263 - Diogo Soares
# Code Smell: Long Parameter List (Fowler)
# Inspection ID: ParametersPerMethod
# Threshold: NOPM >= 4 (Lanza & Marinescu, OO Metrics in Practice)

name: "Code Smell - Long Parameter List"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  detect-long-parameter-list:
    runs-on: ubuntu-latest
    name: "Detect Long Parameter List (Fowler)"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 25        # ← NOVO - instala o JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '25'

      - name: Run Qodana Scan
        uses: JetBrains/qodana-action@v2025.3
        with:
          pr-mode: false
          args: --save-report
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_2026785207 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: long-parameter-list-report
          path: ${{ runner.temp }}/qodana/results/
          retention-days: 14
